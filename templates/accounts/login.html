{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — REMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{% static 'css/rems.css' %}">

<style>
/* ─────────────────────────────────────────────────────────────────────────────
   LOGIN PAGE
   Full-viewport deep navy. Centered frosted card. Gold CTA.
   ───────────────────────────────────────────────────────────────────────────── */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── Canvas ── */
.lp-canvas {
  min-height: 100vh;
  background: #0F172A;       /* deep navy — same as the sidebar */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

/* Atmospheric glow layers */
.lp-canvas::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 75% 15%, rgba(30,58,95,.75) 0%, transparent 60%),
    radial-gradient(ellipse 55% 50% at 15% 85%, rgba(180,83,9,.22) 0%, transparent 55%);
  pointer-events: none;
}

/* Dot-grid texture */
.lp-canvas::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}

/* ── Card ── */
.lp-card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 20px;
  padding: 48px 44px 40px;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.04) inset,
    0 32px 64px rgba(0,0,0,.45),
    0 8px 24px rgba(0,0,0,.3);
}

/* ── Logo mark ── */
.lp-mark {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, #D97706, #F59E0B);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  box-shadow: 0 0 0 1px rgba(255,255,255,.15) inset, 0 8px 24px rgba(217,119,6,.4);
}

.lp-mark svg {
  width: 26px;
  height: 26px;
  fill: #0F172A;
}

/* ── Header text ── */
.lp-header {
  text-align: center;
  margin-bottom: 36px;
}

.lp-title {
  font-size: 28px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 8px;
}

.lp-subtitle {
  font-size: 13px;
  color: rgba(255,255,255,.38);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
}

/* ── Error alert ── */
.lp-error {
  background: rgba(220,38,38,.15);
  border: 1px solid rgba(220,38,38,.3);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 13.5px;
  color: #FCA5A5;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ── Form ── */
.lp-form {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.lp-field {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.lp-label {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,.5);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.lp-input {
  width: 100%;
  height: 48px;
  padding: 0 16px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 10px;
  font-family: inherit;
  font-size: 15px;
  color: #ffffff;
  outline: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
  -webkit-appearance: none;
  appearance: none;
}

.lp-input::placeholder {
  color: rgba(255,255,255,.2);
}

.lp-input:focus {
  background: rgba(255,255,255,.1);
  border-color: #D97706;
  box-shadow: 0 0 0 3px rgba(217,119,6,.2);
}

/* ── Submit button — the gold CTA ── */
.lp-btn {
  width: 100%;
  height: 52px;
  margin-top: 6px;
  background: linear-gradient(135deg, #D97706, #F59E0B);
  color: #0F172A;
  border: none;
  border-radius: 12px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  cursor: pointer;
  transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
  box-shadow: 0 4px 20px rgba(217,119,6,.45), 0 1px 4px rgba(0,0,0,.3);
}

.lp-btn:hover {
  filter: brightness(1.08);
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(217,119,6,.55), 0 2px 8px rgba(0,0,0,.3);
}

.lp-btn:active {
  transform: translateY(0);
  filter: brightness(.98);
}

/* ── Footer ── */
.lp-footer {
  margin-top: 28px;
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,.18);
}
</style>
</head>
<body>

<div class="lp-canvas">
  <div class="lp-card">

    <!-- Logo mark -->
    <div class="lp-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 21V9l9-6 9 6v12H3zm2-2h4v-4h6v4h4V10.1L12 5.2 5 10.1V19zm4-4h6v-2H9v2z"/>
      </svg>
    </div>

    <!-- Header -->
    <div class="lp-header">
      <div class="lp-title">REMS</div>
      <div class="lp-subtitle">Real Estate Management System</div>
    </div>

    <!-- Error messages -->
    {% for message in messages %}
    <div class="lp-error">
      <i class="fas fa-exclamation-circle"></i>
      {{ message }}
    </div>
    {% endfor %}

    <!-- Form -->
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="lp-form">

        <div class="lp-field">
          <label class="lp-label">Username</label>
          <input class="lp-input"
                 type="text"
                 name="username"
                 placeholder="Enter your username"
                 autofocus
                 autocomplete="username">
        </div>

        <div class="lp-field">
          <label class="lp-label">Password</label>
          <input class="lp-input"
                 type="password"
                 name="password"
                 placeholder="Enter your password"
                 autocomplete="current-password">
        </div>

        <button type="submit" class="lp-btn">Sign In</button>

      </div>
    </form>

    <div class="lp-footer">
      Real Estate Management System &copy; 2025
    </div>

  </div>
</div>

</body>
</html>
