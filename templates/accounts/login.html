{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — REMS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{% static 'css/rems.css' %}">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">🏛️</div>
      <div class="login-logo-name">REMS</div>
      <div class="login-logo-sub">Real Estate Management</div>
    </div>
    {% for message in messages %}
    <div class="alert alert-error" style="margin-bottom:16px;">{{ message }}</div>
    {% endfor %}
    <form method="post" novalidate>
      {% csrf_token %}
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="form-group">
          <label class="form-label" style="color:rgba(255,255,255,.55);">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" style="color:rgba(255,255,255,.55);">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;padding:11px;margin-top:8px;font-size:14px;">
          <i class="fas fa-sign-in-alt"></i>&nbsp; Sign In
        </button>
      </div>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,.3);">Real Estate Management System &copy; 2025</p>
  </div>
</div>
</body>
</html>
