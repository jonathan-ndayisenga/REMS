{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Deletion{% endblock %}
{% block content %}
<div style="max-width:480px;">
  <div class="card">
    <div class="card-header" style="background:#FFF1F2;">
      <span class="card-title" style="color:var(--danger);"><i class="fas fa-exclamation-triangle"></i> Delete Confirmation</span>
    </div>
    <div class="card-body">
      <p style="margin-bottom:20px;font-size:14px;">
        Are you sure you want to permanently delete <strong>{{ obj }}</strong>?
        This action cannot be undone.
      </p>
      <form method="post">
        {% csrf_token %}
        <div style="display:flex;gap:10px;">
          <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i>&nbsp; Yes, Delete</button>
          <a href="javascript:history.back()" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
